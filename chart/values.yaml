# Default values for stackedit.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

dropboxAppKey: ""
dropboxAppKeyFull: ""
googleClientId: ""
googleApiKey: ""
githubClientId: ""
githubClientSecret: ""
wordpressClientId: ""
# Legacy chart value; WordPress currently uses browser-side implicit OAuth and no secret.
wordpressSecret: ""
paypalReceiverEmail: ""
awsAccessKeyId: ""
awsSecretAccessKey: ""
# Name of a Secret containing any of: githubClientSecret, wordpressSecret,
# awsAccessKeyId, awsSecretAccessKey. When empty, the chart creates a Secret from
# the values above.
existingSecret: ""

exportMaxConcurrent: 2
exportMaxInputBytes: 5242880
exportRemoteHosts: "stackedit.io"
exportTimeoutMs: 50000

replicaCount: 1

image:
  repository: benweet/stackedit
  tag: vSTACKEDIT_VERSION
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations:
   # kubernetes.io/ingress.class: nginx
   # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
   # - host: stackedit.example.com
   #   paths:
   #     - /

  tls: []
   # - secretName: stackedit-tls
   #   hosts:
   #     - stackedit.example.com

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
